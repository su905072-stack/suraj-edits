<!DOCTYPE html>
<html>
<head>
  <title>Suraj Edits</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    header {
      padding: 15px;
      background: #000;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    h3 {
      font-size: 14px;
      margin: 10px 0;
    }

    button {
      background: #ff004f;
      border: none;
      padding: 8px;
      width: 100%;
      color: white;
      border-radius: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>Suraj Edits</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Trending Template</h3>
    <button onclick="window.location.href='https://yourlink.com'">
      Use Template
    </button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Sad Template</h3>
    <button onclick="window.location.href='https://yourlink.com'">
      Use Template
    </button>
  </div>

</div>

</body>
</html>
